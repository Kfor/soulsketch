<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2845"/>
      <stop offset="100%" style="stop-color:#1e1b2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="16"/>
  <!-- Head -->
  <ellipse cx="200" cy="110" rx="50" ry="58" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.8"/>
  <!-- Hair -->
  <path d="M 150 95 Q 155 55 200 48 Q 245 55 250 95" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <!-- Eyes with detail -->
  <ellipse cx="180" cy="103" rx="8" ry="5" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <circle cx="180" cy="103" r="2.5" fill="#7c3aed" opacity="0.5"/>
  <ellipse cx="220" cy="103" rx="8" ry="5" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <circle cx="220" cy="103" r="2.5" fill="#7c3aed" opacity="0.5"/>
  <!-- Eyebrows -->
  <path d="M 170 94 Q 180 90 190 94" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <path d="M 210 94 Q 220 90 230 94" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <!-- Nose -->
  <path d="M 200 110 L 196 125 Q 200 128 204 125 Z" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M 186 138 Q 193 146 200 144 Q 207 146 214 138" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <!-- Jawline -->
  <path d="M 150 100 Q 145 140 175 162 Q 200 170 225 162 Q 255 140 250 100" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <!-- Neck -->
  <line x1="190" y1="168" x2="190" y2="192" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <line x1="210" y1="168" x2="210" y2="192" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <!-- Shoulders + body -->
  <path d="M 140 205 Q 140 192 200 192 Q 260 192 260 205 L 258 310 Q 258 320 200 322 Q 142 320 142 310 Z" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>
  <!-- Arms -->
  <path d="M 140 205 Q 120 240 125 285" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <path d="M 260 205 Q 280 240 275 285" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
  <!-- Collar detail -->
  <path d="M 185 192 L 200 210 L 215 192" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <text x="200" y="395" text-anchor="middle" fill="#a09cb5" font-size="11" font-family="sans-serif">Getting clearer!</text>
</svg>
